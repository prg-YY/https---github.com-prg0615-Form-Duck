<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/style.css" />

    <title>Duck-Form</title>
  </head>
  <body>
    <div class="main-container">
      <div class="red-container">
        <div class="title">Welcome</div>
        <div class="subtitle">Let's create your account!</div>

        <div class="input-container ic1">
          <input
            id="firstname"
            class="input"
            type="text"
            placeholder="firstname"
            name="btn"
          />
          <!-- <div class="cut"></div> -->
        </div>
        <div class="input-container ic2">
          <input
            id="lastname"
            class="input"
            type="text"
            placeholder="lastname"
            name="btn"
          />
          <!-- <div class="cut"></div> -->
        </div>
        <div class="input-container ic2">
          <input
            id="email"
            class="input"
            type="email"
            placeholder="email"
            name="btn"
          />
          <!-- <div class="cut cut-short"></div> -->
        </div>
        <div class="input-container ic2">
          <input
            id="phone"
            class="input"
            type="number"
            placeholder="phone"
            name="btn"
          />
          <!-- <div class="cut"></div> -->
        </div>
        <p><strong>Message</strong></p>
        <div>
          <textarea rows="6" cols="55">Type some your opinion </textarea>
        </div>

        <button type="text" class="submit" name="btn">submit</button>
        <div class="duc"><img src="/images/hiclipart 2.png" alt="" /></div>
      </div>
    </div>
  </body>
</html>
